<div id="location_background_settings" class="location-background-settings">
    <style>
        #location_background_settings .location-background-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        #location_background_settings .location-background-list,
        #location_background_settings .location-background-list tr,
        #location_background_settings .location-background-list td {
            border: 0 !important;
        }

        #location_background_settings .location-background-list {
            border-collapse: collapse;
        }

        #location_background_settings .location-background-list td {
            padding: 4px 2px;
            vertical-align: middle;
        }

        #location_background_settings .location-background-actions {
            width: 1%;
            white-space: nowrap;
            text-align: right;
        }

        #location_background_settings .location-background-remove-entry {
            min-width: 0;
            width: 2em;
            padding-left: 0;
            padding-right: 0;
        }
    </style>
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Location Background Manager</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="location-background-options">
                <label class="checkbox_label" for="location_background_enabled">
                    <input id="location_background_enabled" type="checkbox">
                    <span>Enable automatic background changes</span>
                </label>

                <label class="checkbox_label" for="location_background_show_toasts">
                    <input id="location_background_show_toasts" type="checkbox">
                    <span>Show toast messages</span>
                </label>

                <label class="checkbox_label" for="location_background_debug">
                    <input id="location_background_debug" type="checkbox">
                    <span>Debug</span>
                </label>
            </div>

            <div class="flex-container alignItemsCenter flexGap5 marginTop10">
                <select id="location_background_world" class="text_pole flex1">
                    <option value="">Select a lorebook</option>
                </select>
                <button id="location_background_refresh_worlds" class="menu_button" type="button" title="Reload lorebook list">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
                <button id="location_background_reload_world" class="menu_button" type="button" title="Reload selected lorebook">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>

            <div id="location_background_debug_info" class="marginTop10">
                <div><b>Selected lorebook:</b> <span id="location_background_selected_world">None</span></div>
                <div><b>Known lorebooks:</b> <span id="location_background_world_count">0</span></div>
                <div><b>Entries loaded:</b> <span id="location_background_entry_count">0</span></div>
                <div><b>Status:</b> <span id="location_background_status">Starting...</span></div>
                <div><b>Last applied:</b> <span id="location_background_last">None yet</span></div>
            </div>

            <div class="marginTop10">
                <h4>Locations</h4>
                <div class="flex-container alignItemsCenter flexGap5">
                    <select id="location_background_entry_picker" class="text_pole flex1">
                        <option value="">Select a lorebook entry</option>
                    </select>
                    <button id="location_background_add_entry" class="menu_button" type="button" title="Add selected location">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <small>Select an entry from the lorebook, then press + to manage it as a location.</small>
            </div>

            <table class="location-background-list wide100p marginTop10">
                <colgroup>
                    <col>
                    <col>
                    <col style="width: 2em;">
                </colgroup>
                <tbody id="location_background_locations_body"></tbody>
            </table>
        </div>
    </div>
</div>
